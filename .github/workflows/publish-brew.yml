name: Publish Homebrew

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      sha256_linux_x86_64:
        required: true
        type: string
      sha256_macos_x86_64:
        required: true
        type: string
      sha256_macos_aarch64:
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true

jobs:
  brew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          TAG="${{ inputs.tag }}"
          SHA256_LINUX_X86_64="${{ inputs.sha256_linux_x86_64 }}"
          SHA256_MACOS_X86_64="${{ inputs.sha256_macos_x86_64 }}"
          SHA256_MACOS_AARCH64="${{ inputs.sha256_macos_aarch64 }}"
          BASE_URL="https://github.com/nevermore23274/AetherTune/releases/download/${TAG}"

          mkdir -p tap
          cd tap
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/nevermore23274/homebrew-aethertune.git .
          mkdir -p Formula

          cat > Formula/aethertune.rb << FORMULA
          class Aethertune < Formula
            desc "Terminal-based internet radio player with real-time audio visualization, built in Rust"
            homepage "https://github.com/nevermore23274/AetherTune"
            license "MIT"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "${BASE_URL}/AetherTune-${TAG}-macos-aarch64.tar.gz"
                sha256 "${SHA256_MACOS_AARCH64}"
              end
              on_intel do
                url "${BASE_URL}/AetherTune-${TAG}-macos-x86_64.tar.gz"
                sha256 "${SHA256_MACOS_X86_64}"
              end
            end

            on_linux do
              on_intel do
                url "${BASE_URL}/AetherTune-${TAG}-linux-x86_64.tar.gz"
                sha256 "${SHA256_LINUX_X86_64}"
              end
            end

            depends_on "mpv"

            def install
              bin.install "AetherTune" => "aethertune"
            end

            def caveats
              <<~EOS
                On Linux, you'll also need pulseaudio-utils or pipewire-pulse
                for real-time audio visualization.
                On macOS, the visualizer runs in simulated mode.
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/aethertune --version 2>&1", 2)
            end
          end
          FORMULA

          sed -i 's/^          //' Formula/aethertune.rb

          git config user.name "sineyed"
          git config user.email "sineyed@users.noreply.github.com"
          git add Formula/aethertune.rb
          git diff --cached --quiet || git commit -m "Update to v${VERSION}"
          git push